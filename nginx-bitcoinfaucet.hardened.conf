# ─────────────────────────────────────────────────────────────────────────────
# BTCFaucet — origin endurecido contra spoofing de IP.
# TLS é terminado na Cloudflare; este origin serve HTTP na porta 80.
#
# O que isto faz:
#   1) real_ip: recupera o IP real do visitante do header CF-Connecting-IP,
#      mas SÓ confiando nele quando a conexão vem de um IP da Cloudflare.
#   2) geo sobre $realip_remote_addr (o IP ORIGINAL da conexão, antes da
#      substituição): recusa com 403 qualquer conexão que não venha da CF —
#      é o que impede alguém de bater direto no origin e forjar o IP.
#   3) Sobrescreve CF-Connecting-IP / X-Forwarded-For repassados ao backend
#      com o IP real, descartando qualquer valor forjado pelo cliente.
#
# Mantenha os ranges atualizados: https://www.cloudflare.com/ips/
# ─────────────────────────────────────────────────────────────────────────────

# Ranges oficiais da Cloudflare (IPv4)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare (IPv6)
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# 1 se a CONEXÃO veio de um IP da Cloudflare (usa o IP original, não o header).
geo $realip_remote_addr $from_cloudflare {
    default 0;
    173.245.48.0/20 1;
    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22 1;
    141.101.64.0/18 1;
    108.162.192.0/18 1;
    190.93.240.0/20 1;
    188.114.96.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
    162.158.0.0/15 1;
    104.16.0.0/13 1;
    104.24.0.0/14 1;
    172.64.0.0/13 1;
    131.0.72.0/22 1;
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name bitcoinfaucet.st www.bitcoinfaucet.st;

    # Recusa quem não vier da Cloudflare (anti-spoof do origin).
    if ($from_cloudflare = 0) {
        return 403;
    }

    location / {
        proxy_pass http://127.0.0.1:8420;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Descarta valores forjados: repassa só o IP real resolvido pela CF.
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
